---
# tasks file for kube_packages
- name: install dependencies
  apt:
    name:
      - apt-transport-https
      - curl
    state: present

- name: install kube tools
  apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
  with_items: "{{ packages }}"
