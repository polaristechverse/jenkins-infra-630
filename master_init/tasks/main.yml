# Initialize Kubernetes cluster (only if not already initialized)
- name: initialize cluster with docker runtime
  shell: |
    kubeadm init \
    --pod-network-cidr=192.168.0.0/16 \
    --cri-socket=unix:///var/run/cri-dockerd.sock
  args:
    creates: /etc/kubernetes/admin.conf
  register: kubeinit

# Get clean join command (BEST METHOD)
- name: generate join command
  shell: kubeadm token create --print-join-command
  register: join_cmd
  changed_when: false

# Store join command for other hosts
- name: save join command
  set_fact:
    join_command: "{{ join_cmd.stdout }}"

# Create .kube directory
- name: create kube directory
  file:
    path: /root/.kube
    state: directory
    mode: '0755'

# Copy admin config
- name: copy kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: yes

# Set ownership (optional but good practice)
- name: set kube config permissions
  file:
    path: /root/.kube/config
    owner: root
    group: root
    mode: '0644'

# Verify cluster status
- name: check cluster nodes
  shell: kubectl get nodes
  register: cluster_status
  changed_when: false

- name: display cluster status
  debug:
    msg: "{{ cluster_status.stdout }}"
